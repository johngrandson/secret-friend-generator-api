# Quick Start:
#
# pip install pre-commit
# pre-commit install && pre-commit install -t pre-push
# pre-commit run --all-files
#
# To Skip Checks:
#
# git commit --no-verify
fail_fast: false

default_language_version:
  python: python3.11.2

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # ruff version.
    rev: v0.7.0
    hooks:
      # Run the linter.
      #
      # When running with --fix, Ruff's lint hook should be placed before Ruff's formatter hook,
      # and before Black, isort, and other formatting tools, as Ruff's fix behavior can output code changes that require reformatting.
      - id: ruff
        args: [--fix]
      # Run the formatter.
      - id: ruff-format

  # Typos
  - repo: https://github.com/crate-ci/typos
    rev: v1.26.1
    hooks:
      - id: typos
        exclude: ^(data/app-sample-data.dump|src/app/static/app/src/|src/app/database/revisions/)

  # Pytest
  - repo: local
    hooks:
      - id: tests
        name: run tests
        entry: pytest -v tests/
        language: system
        types: [python]
        stages: [push]

  - repo: local
    hooks:
      - id: lint-imports
        name: import-linter (architecture rules)
        entry: poetry run lint-imports
        language: system
        types: [python]
        pass_filenames: false

  # Pre-push: full architecture verification bundle
  # See scripts/verify-arch.sh and .claude/rules/clean-architecture-enforcement.md
  - repo: local
    hooks:
      - id: verify-arch
        name: verify-arch (full architecture bundle)
        entry: bash scripts/verify-arch.sh
        language: system
        types: [python]
        pass_filenames: false
        stages: [push]
