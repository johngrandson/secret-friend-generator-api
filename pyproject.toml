[tool.ruff]
exclude = ["env", "migrations"]
line-length = 88
select = ["F", "E", "W"]
fixable = ["F", "E"]

[tool.ruff.per-file-ignores]
# SQLAlchemy uses string forward references in Mapped[] for cross-model relationships.
# These are resolved at runtime by the ORM registry, not by Python's name resolution.
"src/domain/*/model.py" = ["F821"]

[tool.poetry]
name = "app"
version = "0.1.0"
description = "FastAPI application"
authors = ["João Netto <joaonettopb@hotmail.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11"
fastapi = ">=0.115.0"
uvicorn = ">=0.22.0"
SQLAlchemy = ">=2.0.13"
psycopg2-binary = ">=2.9.6"
gunicorn = ">=22.0.0"
python-dotenv = ">=1.0.0"
alembic = ">=1.11.1"
pydantic = ">=2.10.0"
pydantic-settings = ">=2.0.0"
httpx = ">=0.24.1"
slowapi = "^0.1.9"
sentry-asgi = "^0.2.0"
sqlalchemy-utils = "^0.41.2"
langchain-openai = "^0.3"
langgraph = "^1.0"
langgraph-supervisor = ">=0.0.12"
langgraph-swarm = ">=0.0.10"
langchain-mcp-adapters = "^0.1"
langchain-text-splitters = "^0.3"
langchain = "^1.2.15"
blinker = "^1.9.0"
celery = {version = ">=5.3", extras = ["rabbitmq"]}

[tool.poetry.dev-dependencies]
pytest = "7.4.0"
ruff = "^0.0.290"
pytest-asyncio = "^0.23"
mypy = ">=1.10"
celery-stubs = ">=0.1.3"

[tool.poetry.scripts]
start = "bin.run:start"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
# SQLAlchemy models use string forward references resolved at runtime.
plugins = ["pydantic.mypy"]

# Third-party libraries without stubs or py.typed marker.
[[tool.mypy.overrides]]
module = [
    "sentry_asgi.*",
    "slowapi.*",
    "kombu.*",
    "langgraph.*",
    "langgraph_supervisor.*",
    "langgraph_swarm.*",
    "langchain_mcp_adapters.*",
    "langchain_core.*",
    "langchain_openai.*",
    "langchain_text_splitters.*",
    "langchain.*",
]
ignore_missing_imports = true

# SQLAlchemy models use string forward references resolved at runtime by the ORM registry.
[[tool.mypy.overrides]]
module = "src.domain.*.model"
disable_error_code = ["name-defined"]

# Agents domain uses dynamic LangChain APIs with loose typing.
[[tool.mypy.overrides]]
module = [
    "src.domain.agents.*",
    "src.api.agents.*",
]
disallow_untyped_defs = false
disable_error_code = ["list-item", "call-arg", "return-value", "no-any-return"]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
