name: CI Failure Comment

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  pull-requests: write
  actions: read

jobs:
  comment:
    name: Post CI Failure Comment
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
              state: 'open',
            });
            if (pulls.data.length === 0) {
              core.setFailed('No open PR found for this branch');
              return;
            }
            core.setOutput('number', pulls.data[0].number);

      - name: Get failed jobs
        id: jobs
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });

            const failed = jobs.data.jobs
              .filter(j => j.conclusion === 'failure')
              .map(j => j.name);

            core.setOutput('failed', JSON.stringify(failed));

      - name: Build and post comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};
            const failed = JSON.parse('${{ steps.jobs.outputs.failed }}');
            const runUrl = context.payload.workflow_run.html_url;
            const marker = '<!-- ci-failure-bot -->';

            const commands = {
              'Lint': 'ruff check . && ruff format --check .',
              'Type Check': 'mypy src/',
              'Architecture': 'lint-imports',
              'Tests': 'pytest tests/ -v',
            };

            let body = `${marker}\n## CI Failed\n\n`;
            body += `**Failed jobs:** ${failed.join(', ')}\n\n`;
            body += `**[View full logs](${runUrl})**\n\n`;
            body += `### Reproduce locally\n\n`;
            body += '```bash\n';
            for (const job of failed) {
              if (commands[job]) {
                body += `# ${job}\n${commands[job]}\n`;
              }
            }
            body += '```\n';

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
